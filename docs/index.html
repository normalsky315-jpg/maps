</head> 


<body>

<div class="topbar">
  <span></span>
  <span class="case-name">友眾16青砥</span>
</div>


<main>

  <h1>合約審閱本</h1>


  <div class="review-banner">

    歡迎審閱「友眾16青砥」預售屋買賣契約

    <small>
      依消費者保護法規定，契約審閱期間至少五日，請於審閱期間內詳閱以下契約全文。
    </small>

  </div>



  <a class="home-card" href="land-contract.html">

    <div class="title">
      預定土地買賣契約書
    </div>

    <div class="desc">
      土地標示、面積找補、履約保證機制、付款與貸款條件、稅費負擔、違約處罰等全部條款

  <!-- QR Code區域 -->

  <div class="qr-box">

    <div id="qrcode"></div>

    <p>
      掃描 QR Code 隨時開啟本審閱本
    </p>

  </div>

<footer class="page-end">

本頁為合約審閱電子版，僅供買方審閱參考，正式簽約以紙本契約書為準。

</footer>




<!-- QR Code產生 -->

<script>

document.addEventListener("DOMContentLoaded", function(){


    new QRCode(document.getElementById("qrcode"), {

        text: window.location.href,

        width: 220,

        height: 220,

        colorDark: "#6b4525",

        colorLight: "#ffffff",

        correctLevel: QRCode.CorrectLevel.H

    });


});


</script>
